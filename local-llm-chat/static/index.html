<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local LLM Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #16213e;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #0f3460;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; color: #e94560; }

    #status {
      margin-left: auto;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 12px;
      background: #333;
      color: #aaa;
    }
    #status.connected { background: #1b5e20; color: #a5d6a7; }
    #status.error     { background: #b71c1c; color: #ef9a9a; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9rem;
    }

    .msg.user {
      align-self: flex-end;
      background: #0f3460;
      color: #e0e0e0;
      border-bottom-right-radius: 3px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #16213e;
      color: #e0e0e0;
      border-bottom-left-radius: 3px;
      border: 1px solid #0f3460;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      color: #888;
      font-size: 0.78rem;
      border: none;
      padding: 4px 0;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: #e94560;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    #input-area {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      background: #16213e;
      border-top: 1px solid #0f3460;
    }

    #user-input {
      flex: 1;
      background: #0f3460;
      border: 1px solid #1a3a6b;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 0.9rem;
      resize: none;
      height: 48px;
      max-height: 140px;
      outline: none;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: #e94560; }

    button {
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      align-self: flex-end;
      height: 48px;
      transition: background 0.2s;
    }
    button:hover:not(:disabled)  { background: #c73652; }
    button:disabled { background: #555; cursor: not-allowed; }

    #clear-btn {
      background: transparent;
      border: 1px solid #555;
      color: #aaa;
    }
    #clear-btn:hover:not(:disabled) { background: #222; }
  </style>
</head>
<body>
  <header>
    <h1>Local LLM Chat</h1>
    <span id="status">Connecting…</span>
  </header>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
    <button id="clear-btn" title="Clear history">Clear</button>
    <button id="send-btn" disabled>Send</button>
  </div>

  <script>
    const messagesEl  = document.getElementById('messages');
    const inputEl     = document.getElementById('user-input');
    const sendBtn     = document.getElementById('send-btn');
    const clearBtn    = document.getElementById('clear-btn');
    const statusEl    = document.getElementById('status');

    let ws = null;
    let currentAssistantEl = null;
    let isGenerating = false;
    let history = [];

    // ── WebSocket ─────────────────────────────────────────────────────────────
    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws/chat`);

      ws.onopen = () => {
        setStatus('Connected', 'connected');
        sendBtn.disabled = false;
      };

      ws.onclose = () => {
        setStatus('Disconnected — reconnecting…', 'error');
        sendBtn.disabled = true;
        setTimeout(connect, 3000);
      };

      ws.onerror = () => setStatus('Connection error', 'error');

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type === 'token') {
          appendToken(msg.text);

        } else if (msg.type === 'done') {
          finaliseAssistantMessage();

        } else if (msg.type === 'error') {
          finaliseAssistantMessage();
          addMessage('system', `Error: ${msg.message}`);
        }
      };
    }

    // ── Status ────────────────────────────────────────────────────────────────
    function setStatus(text, cls = '') {
      statusEl.textContent = text;
      statusEl.className = cls;
    }

    // ── Messages ──────────────────────────────────────────────────────────────
    function addMessage(role, text) {
      const div = document.createElement('div');
      div.classList.add('msg', role);
      div.textContent = text;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    function startAssistantMessage() {
      currentAssistantEl = document.createElement('div');
      currentAssistantEl.classList.add('msg', 'assistant');
      currentAssistantEl.textContent = '';

      const cursor = document.createElement('span');
      cursor.classList.add('cursor');
      currentAssistantEl.appendChild(cursor);

      messagesEl.appendChild(currentAssistantEl);
      scrollToBottom();
      return currentAssistantEl;
    }

    function appendToken(text) {
      if (!currentAssistantEl) startAssistantMessage();
      // Insert text before the cursor
      const cursor = currentAssistantEl.querySelector('.cursor');
      cursor.insertAdjacentText('beforebegin', text);
      scrollToBottom();
    }

    function finaliseAssistantMessage() {
      if (!currentAssistantEl) return;
      const cursor = currentAssistantEl.querySelector('.cursor');
      if (cursor) cursor.remove();

      const text = currentAssistantEl.textContent.trim();
      if (text) history.push({ role: 'assistant', content: text });

      currentAssistantEl = null;
      isGenerating = false;
      sendBtn.textContent = 'Send';
      sendBtn.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Send ──────────────────────────────────────────────────────────────────
    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isGenerating || !ws || ws.readyState !== WebSocket.OPEN) return;

      addMessage('user', text);
      history.push({ role: 'user', content: text });
      inputEl.value = '';
      inputEl.style.height = '48px';

      isGenerating = true;
      sendBtn.textContent = 'Stop';
      sendBtn.disabled = false;
      inputEl.disabled = true;
      startAssistantMessage();

      ws.send(JSON.stringify({
        type: 'chat',
        message: text,
        history: history.slice(0, -1), // exclude the message we just appended
      }));
    }

    // ── Controls ──────────────────────────────────────────────────────────────
    sendBtn.addEventListener('click', () => {
      if (isGenerating) {
        ws.send(JSON.stringify({ type: 'cancel' }));
      } else {
        sendMessage();
      }
    });

    clearBtn.addEventListener('click', () => {
      messagesEl.innerHTML = '';
      history = [];
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = '48px';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    });

    connect();
  </script>
</body>
</html>
