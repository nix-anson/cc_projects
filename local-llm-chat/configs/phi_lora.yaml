# LoRA fine-tuning config for Microsoft Phi-2 (2.7B params)
# Suitable for single 8GB VRAM GPU with 4-bit quantization.

base_model_id: "microsoft/phi-2"
hf_token: ""

# Dataset
dataset_name: "timdettmers/openassistant-guanaco"
dataset_split: "train"
text_column: "text"
max_seq_length: 1024

# Output
output_dir: "models/adapters/phi2-lora"
logging_dir: "logs/phi2-lora"

# Training
num_train_epochs: 3
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
warmup_ratio: 0.05
lr_scheduler_type: "cosine"
save_steps: 100
logging_steps: 10
fp16: false
bf16: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj", "k_proj", "dense"]
  bias: "none"
  task_type: "CAUSAL_LM"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "bfloat16"
