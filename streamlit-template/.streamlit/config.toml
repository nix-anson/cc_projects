[server]
# Server configuration
port = 8501
address = "localhost"
headless = false
runOnSave = true
enableCORS = false
enableXsrfProtection = true

[browser]
# Browser configuration
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[theme]
# Theme configuration
primaryColor = "#FF4B4B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[client]
# Client configuration
showErrorDetails = true
toolbarMode = "auto"

[runner]
# Runner configuration
magicEnabled = true
fastReruns = true
